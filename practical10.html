<html>

    <style>

        body{

        }

        .box{
            background-color: white;

    <form method="POST">

        <label>Name:</label>
        <input type="text" name="name">

        <label>Email:</label>
        <input type="email" name="email">

        <br><br>

        <input type="submit"
               value="Submit"
               class="btn">

<?php

if($_SERVER["REQUEST_METHOD"] == "POST")
{
    $name = $_POST['name'];
    $email = $_POST['email'];

    echo "<h3>Entered Details</h3>";

    echo "Name: " . $name . "<br><br>";

    echo "Email: " . $email;
}

?>
