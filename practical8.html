<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>

    <script>

        function calculate()
        {
            var num1 =
            parseInt(document.getElementById("n1").value);

            var num2 =
            parseInt(document.getElementById("n2").value);

            var op =
            document.getElementById("operator").value;

            var result;

            switch(op)
            {
                case '+':
                    result = num1 + num2;
                    break;

                case '-':
                    result = num1 - num2;
                    break;

                case '*':
                    result = num1 * num2;
                    break;

                case '/':
                    result = num1 / num2;
                    break;

                default:
                    result = "Invalid Operator";
            }

            document.getElementById("answer").innerHTML =
            "Result = " + result;
        }

    </script>

</head>

<body bgcolor="lightyellow">

    <center>

    <h1>Simple Calculator</h1>

    <input type="number" id="n1" placeholder="Enter First Number">
    <br><br>

    <input type="number" id="n2" placeholder="Enter Second Number">
    <br><br>

    <input type="text" id="operator"
    placeholder="Enter + - * /">
    <br><br>

    <button onclick="calculate()">
        Calculate
    </button>

    <h2 id="answer"></h2>

    </center>

</body>
</html>
