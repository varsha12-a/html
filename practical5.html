<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Responsive Page</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body>

    <div class="container">

        <h1 class="text-center text-primary mt-4">
            Bootstrap Example
        </h1>

        <div class="row mt-4">

            <div class="col-md-4">
                <div class="card p-3">
                    <h3>Card 1</h3>
                    <p>This is first bootstrap card.</p>
                    <button class="btn btn-primary">
                        Click Here
                    </button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h3>Card 2</h3>
                    <p>This is second bootstrap card.</p>
                    <button class="btn btn-success">
                        Submit
                    </button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h3>Card 3</h3>
                    <p>This is third bootstrap card.</p>
                    <button class="btn btn-danger">
                        Delete
                    </button>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
