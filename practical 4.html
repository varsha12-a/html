<!DOCTYPE html>
<html>
<head>
    <title>CSS Types Example</title>

    <!-- Internal CSS -->
    <style>

        h2{
            color: blue;
            text-align: center;
        }

        table{
            border-collapse: collapse;
            width: 50%;
        }

        th{
            background-color: lightgreen;
        }

       
    </style>

</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color:red; text-align:center;">
        Student Information
    </h1>

    <h2>Using Internal CSS</h2>

    <center>

    <table border="1" cellpadding="10">

        <tr>
            <th>Name</th>
            <th>City</th>
        </tr>

        <tr>
            <td>Vaishnavi</td>
            <td>Pune</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>Mumbai</td>
        </tr>

    </table>

    </center>

    <p>
        This paragraph is styled using External CSS.
    </p>

</body>
</html>
